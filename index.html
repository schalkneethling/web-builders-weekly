    <script>
      (() => {
        const key = "web-builders-weekly:theme-preference:v1";
        const query = "(prefers-color-scheme: dark)";
        const root = document.documentElement;
        const systemTheme = matchMedia(query).matches ? "dark" : "light";

        try {
          const storedPreference = localStorage.getItem(key);
          const preference = ["system", "light", "dark"].includes(storedPreference)
            ? storedPreference
            : "system";

          root.dataset.themePreference = preference;
          root.dataset.theme = preference === "system" ? systemTheme : preference;
        } catch {
          root.dataset.themePreference = "system";
          root.dataset.theme = systemTheme;
        }
      })();
    </script>
    <link rel="stylesheet" href="/src/style.css" />
